<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>האתר של gy-m</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 900px;
      margin: 40px auto;
      padding: 20px;
      background: #f6f8fb;
    }
    h1 {
      margin-bottom: 24px;
    }
    .links {
      display: grid;
      gap: 12px;
    }
    a.card {
      display: block;
      padding: 16px 18px;
      background: white;
      border: 1px solid #d9e1ea;
      border-radius: 12px;
      text-decoration: none;
      color: #111827;
    }
    a.card:hover {
      background: #f9fbff;
    }
    .title {
      font-weight: bold;
      margin-bottom: 6px;
    }
    .desc {
      color: #6b7280;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <h1>הכלים והפרויקטים שלי</h1>

  <div class="links">
    <a class="card" href="meal-tracker/">
      <div class="title">מעקב ארוחות</div>
      <div class="desc">מחשבון תזונה עם שמירה מקומית, ייבוא וייצוא JSON</div>
    </a>

    <a class="card" href="tool-2/">
      <div class="title">כלי נוסף</div>
      <div class="desc">יופיע כאן בהמשך</div>
    </a>
  </div>
</body>
</html>
