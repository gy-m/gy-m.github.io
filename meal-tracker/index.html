
<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
<title>מעקב ארוחות חכם לנייד</title>

  <meta name="theme-color" content="#111827">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="מעקב ארוחות">
  <meta name="mobile-web-app-capable" content="yes">
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="apple-touch-icon" href="./icon-192.png">

<style>
:root {
  --bg:#ddeeff; --card:#fff; --grid:#b8ceea; --head:#c8dff5; --sum:#daeaf8;
  --text:#1f2937; --muted:#4a6080; --accent:#2563eb; --good:#065f46; --chip:#cce0ff;
  --section-bg:#e8f2ff; --section-border:#aac8e8;
}
* { box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
html, body { margin:0; padding:0; background:var(--bg); color:var(--text); font-family:Arial,"Noto Sans Hebrew","Segoe UI",sans-serif; }
body { padding-bottom:max(20px, env(safe-area-inset-bottom)); }
.wrap { max-width:1500px; margin:0 auto; padding:12px; }
.card { background:var(--card); border:1px solid #e5e7eb; border-radius:18px; box-shadow:0 10px 30px rgba(15,23,42,.08); overflow:hidden; }
.top { padding:16px; border-bottom:1px solid #edf2f7; display:flex; justify-content:space-between; gap:12px; flex-wrap:wrap; align-items:flex-start; }
h1 { margin:0 0 4px; font-size:24px; }
.sub { margin:0; color:var(--muted); font-size:14px; }
.actions { display:flex; gap:8px; flex-wrap:wrap; width:100%; }
button {
  border:0; border-radius:12px; padding:12px 14px; font-size:15px; line-height:1.1;
  cursor:pointer; background:#111827; color:#fff; min-height:44px;
}
button.secondary { background:#e5e7eb; color:#111827; }
button.small { padding:10px 12px; font-size:13px; background:#eef2ff; color:#1e3a8a; min-height:38px; }
.status { padding:0 16px 10px; color:var(--good); font-size:13px; min-height:22px; }
.toolbar { padding:0 16px 12px; display:grid; gap:12px; }
.quickadd {
  display:grid; grid-template-columns:1fr; gap:8px; background:var(--section-bg); border:1px solid var(--section-border); border-radius:14px; padding:12px;
}
.quickadd .title, .chart-title { font-size:14px; font-weight:700; }
.quickadd-row { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
.chart-wrap { padding:0 16px 14px; }
.chart-card { background:var(--section-bg); border:1px solid var(--section-border); border-radius:14px; padding:12px; }
.chart-grid { display:flex; align-items:flex-end; gap:10px; min-height:150px; overflow-x:auto; padding-top:6px; }
.bar-group { min-width:52px; text-align:center; }
.bar { width:100%; border-radius:10px 10px 0 0; background:linear-gradient(180deg,#60a5fa,#2563eb); min-height:2px; }
.bar-value { font-size:12px; color:var(--muted); margin-bottom:6px; }
.bar-label { font-size:12px; margin-top:6px; white-space:nowrap; }
.table-wrap { padding:12px; overflow:auto; -webkit-overflow-scrolling:touch; }
table { border-collapse:collapse; width:max-content; min-width:100%; background:#fff; table-layout:auto; white-space:nowrap; font-size:14px; }
th, td { border:1px solid var(--grid); padding:8px 6px; text-align:center; vertical-align:middle; }
th { position:sticky; top:0; z-index:5; background:var(--head); font-weight:700; }
td.daycell, td.mealcell { background:var(--section-bg); font-weight:700; }
tr.summary td { background:var(--sum); font-weight:700; }
tr.summary td.total-label { color:var(--accent); }
input, select {
  width:100%; min-width:0; border:1px solid #cfd8e3; border-radius:10px; padding:10px 8px;
  font-size:16px; background:#fff; color:#111827; min-height:44px;
}
input.qty { max-width:68px; text-align:center; }
input.metric { max-width:78px; text-align:center; background:#fcfdff; }
td.foodcell { min-width:180px; text-align:right; position:relative; }
td.unitcell { min-width:90px; }
td.actioncell { min-width:76px; }
.custom-food-section { background:var(--section-bg); border:1px solid var(--section-border); border-radius:14px; padding:12px; }
.custom-food-section .title { font-size:14px; font-weight:700; cursor:pointer; user-select:none; display:flex; justify-content:space-between; align-items:center; }
.custom-food-section .toggle-icon { font-size:18px; color:var(--muted); transition:transform .2s; }
.custom-food-section.open .toggle-icon { transform:rotate(45deg); }
.custom-food-body { display:none; margin-top:10px; }
.custom-food-section.open .custom-food-body { display:block; }
.custom-food-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
.custom-food-grid label { font-size:12px; color:var(--muted); }
.custom-food-grid .field { display:flex; flex-direction:column; gap:3px; }
.custom-food-list { margin-top:10px; }
.custom-food-list-item { display:flex; justify-content:space-between; align-items:center; padding:7px 8px; border:1px solid var(--section-border); border-radius:8px; margin-bottom:5px; font-size:13px; background:#f0f7ff; }
.custom-food-list-item .cf-name { font-weight:700; }
.custom-food-list-item .cf-meta { color:var(--muted); font-size:12px; }
.cf-del { background:#fee2e2; color:#991b1b; min-height:30px; padding:4px 10px; font-size:12px; }
@media (min-width:600px) {
  .custom-food-grid { grid-template-columns:repeat(3,1fr); }
}
@media (min-width:900px) {
  .actions { width:auto; }
  .quickadd-row { grid-template-columns:repeat(4, minmax(120px,1fr)); }
  .custom-food-grid { grid-template-columns:repeat(6,1fr); }
}
.week-picker { display:flex; align-items:center; gap:12px; flex-wrap:wrap; }
.week-picker .title { cursor:default; pointer-events:none; }
.week-picker-input { width:auto; flex:0 0 auto; min-height:38px; padding:6px 10px; }
.week-label { font-size:14px; color:var(--muted); font-weight:600; }

.ac-input { padding-left:42px; }
.ac-clear {
  position:absolute; left:6px; top:50%; transform:translateY(-50%);
  width:28px; height:28px; min-height:auto; border-radius:999px; border:0;
  background:#eef2ff; color:#1e3a8a; font-size:16px; line-height:1; padding:0; cursor:pointer;
}
.ac-menu {
  position:fixed; display:none; z-index:9999; background:#fff; border:1px solid #cfd8e3;
  border-radius:12px; box-shadow:0 12px 32px rgba(15,23,42,.16); max-height:50vh; overflow:auto;
}
.ac-item { padding:12px 14px; border-bottom:1px solid #eef2f7; cursor:pointer; font-size:15px; text-align:right; }
.ac-item:last-child { border-bottom:0; }
.ac-item:hover, .ac-item.active { background:#f3f6fb; }
.chip { display:inline-block; background:var(--chip); color:#1e3a8a; padding:4px 8px; border-radius:999px; font-size:12px; }
.helper { color:var(--muted); font-size:12px; }

/* ===== Mobile: card layout — no horizontal scroll ===== */
@media (max-width:599px) {
  .table-wrap { overflow-x:hidden; padding:8px; }
  table { display:block; white-space:normal; min-width:unset; width:100%; }
  table thead { display:none; }
  table tbody { display:block; }

  tbody tr:not(.summary) {
    display:flex; flex-wrap:wrap; align-items:flex-end; gap:6px;
    padding:10px; border:1px solid #e5e7eb; border-radius:14px;
    margin-bottom:8px; background:#fff;
  }
  tbody tr:not(.summary) td { border:none; padding:0; min-width:unset; }

  /* Date / day / meal badges */
  td.daycell.datecell, td.daycell.daynamecell {
    order:1; font-size:12px; background:var(--head); border-radius:6px;
    padding:3px 7px; align-self:center;
  }
  td.mealcell { order:2; font-size:12px; background:#eef2ff; color:#1e3a8a; border-radius:6px; padding:3px 8px; align-self:center; }
  td.daycell.datecell:empty, td.daycell.daynamecell:empty, td.mealcell:empty { display:none; }

  /* Food input full width */
  td.foodcell { order:10; flex:0 0 100%; min-width:unset; }

  /* Metrics row with tiny labels */
  td.unitcell    { order:20; display:flex; flex-direction:column; align-items:center; }
  td.qtycell     { order:21; display:flex; flex-direction:column; align-items:center; }
  td.calcell     { order:22; display:flex; flex-direction:column; align-items:center; }
  td.proteincell { order:23; display:flex; flex-direction:column; align-items:center; }
  td.carbscell   { order:24; display:flex; flex-direction:column; align-items:center; }
  td.fatcell     { order:25; display:flex; flex-direction:column; align-items:center; }
  td.actioncell  { order:26; min-width:unset; align-self:center; }

  td.unitcell::before    { content:"יח׳";  font-size:10px; color:var(--muted); }
  td.qtycell::before     { content:"כמות"; font-size:10px; color:var(--muted); }
  td.calcell::before     { content:"קל׳";  font-size:10px; color:var(--muted); }
  td.proteincell::before { content:"חלב׳"; font-size:10px; color:var(--muted); }
  td.carbscell::before   { content:"פח׳";  font-size:10px; color:var(--muted); }
  td.fatcell::before     { content:"שומ׳"; font-size:10px; color:var(--muted); }

  input.qty    { max-width:54px; width:54px; }
  input.metric { max-width:52px; width:52px; font-size:13px; min-height:36px; padding:4px 2px; }

  /* Summary card */
  tr.summary {
    display:flex; flex-wrap:wrap; gap:6px; align-items:center;
    padding:8px 10px; border:1px solid var(--section-border); border-radius:14px;
    margin-bottom:8px; background:var(--sum);
  }
  tr.summary td { border:none; font-size:13px; padding:2px 4px; }
  tr.summary td:empty { display:none; }
  tr.summary td.total-label { flex:0 0 100%; color:var(--accent); font-weight:700; }
  tr.summary td.calcell, tr.summary td.proteincell,
  tr.summary td.carbscell, tr.summary td.fatcell { font-weight:700; }
}

</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <div class="top">
      <div>
        <h1>מעקב ארוחות חכם</h1>
        <p class="sub">Autocomplete אמיתי, הוספה מהירה ושמירה מקומית. מותאם לנייד.</p>
      </div>
      <div class="actions">
        <button id="importBtn" class="secondary">ייבוא JSON</button>
        <button id="exportBtn" class="secondary">ייצוא JSON</button>
        <button id="resetBtn">איפוס נתוני שבוע</button>
        <button id="clearStorageBtn" class="secondary">🗑 נקה נתונים מקומיים</button>
      </div>
    </div>
      <input id="importFile" type="file" accept="application/json,.json" style="display:none">

    <div class="status" id="status"></div>

    <div class="toolbar">
      <div class="custom-food-section week-picker" id="weekPickerSection">
        <div class="title">📅 בחר שבוע</div>
        <input type="date" id="weekDateInput" class="week-picker-input">
        <span id="weekLabel" class="week-label"></span>
      </div>

      <div class="quickadd">
        <div class="title">הוספה מהירה</div>
        <div class="quickadd-row">
          <select id="quickDay"></select>
          <select id="quickMeal"></select>
          <input id="quickQty" type="number" min="0" step="0.25" value="1" placeholder="כמות">
          <button id="quickAddBtn" class="small" style="background:#1e3a8a;color:#fff;">הוסף לשורה פנויה</button>
        </div>
        <div>
          <div class="ac-wrap">
            <input id="quickFoodInput" class="ac-input" type="text" placeholder="הקלד מזון, למשל: עוף, פיתה, וויסקי" autocomplete="off" />
          </div>
          <div id="quickFoodMenu" class="ac-menu"></div>
          <div class="helper">בתוך הטבלה יש כפתור נקה לכל שורה.</div>
        </div>
      </div>

      <div class="custom-food-section" id="manualSection">
        <div class="title" id="manualSectionToggle">
          <span>⚡ הוספה ידנית (ללא שמירה)</span>
          <span class="toggle-icon">+</span>
        </div>
        <div class="custom-food-body" id="manualAddSection">
          <div class="custom-food-grid">
            <div class="field">
              <label for="manualName">שם המזון *</label>
              <input id="manualName" type="text" placeholder="שם המזון" autocomplete="off">
            </div>
            <div class="field">
              <label for="manualUnit">יחידה</label>
              <input id="manualUnit" type="text" placeholder="מנה">
            </div>
            <div class="field">
              <label for="manualCal">קלוריות</label>
              <input id="manualCal" type="number" min="0" step="0.1" placeholder="0">
            </div>
            <div class="field">
              <label for="manualProtein">חלבון (גר׳)</label>
              <input id="manualProtein" type="number" min="0" step="0.1" placeholder="0">
            </div>
            <div class="field">
              <label for="manualCarbs">פחמימות (גר׳)</label>
              <input id="manualCarbs" type="number" min="0" step="0.1" placeholder="0">
            </div>
            <div class="field">
              <label for="manualFat">שומן (גר׳)</label>
              <input id="manualFat" type="number" min="0" step="0.1" placeholder="0">
            </div>
          </div>
          <div style="margin-top:10px;">
            <button id="manualAddBtn" class="small" style="background:#1e3a8a;color:#fff;">הוסף לשורה פנויה</button>
          </div>
        </div>
      </div>

      <div class="custom-food-section" id="customFoodSection">
        <div class="title" id="customFoodToggle">
          <span>הוספת מזון מותאם אישית (כולל שמירה)</span>
          <span class="toggle-icon">+</span>
        </div>
        <div class="custom-food-body">
          <div class="custom-food-grid">
            <div class="field">
              <label>שם המזון *</label>
              <input id="cfName" type="text" placeholder="למשל: גבינה צהובה" autocomplete="off">
            </div>
            <div class="field">
              <label>יחידת בסיס *</label>
              <input id="cfUnit" type="text" placeholder="למשל: 100 גרם">
            </div>
            <div class="field">
              <label>קלוריות *</label>
              <input id="cfCal" type="number" min="0" step="0.1" placeholder="קל׳">
            </div>
            <div class="field">
              <label>חלבון (גר׳)</label>
              <input id="cfProtein" type="number" min="0" step="0.1" placeholder="0">
            </div>
            <div class="field">
              <label>פחמימות (גר׳)</label>
              <input id="cfCarbs" type="number" min="0" step="0.1" placeholder="0">
            </div>
            <div class="field">
              <label>שומן (גר׳)</label>
              <input id="cfFat" type="number" min="0" step="0.1" placeholder="0">
            </div>
          </div>
          <div style="margin-top:10px;">
            <button id="cfSaveBtn" class="small" style="background:#065f46;color:#fff;">שמור מזון מותאם</button>
          </div>
          <div class="custom-food-list" id="customFoodList"></div>
        </div>
      </div>
    </div>

    <div class="chart-wrap">
      <div class="chart-card">
        <div class="chart-title">קלוריות ליום</div>
        <div class="chart-grid" id="chartGrid"></div>
      </div>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>תאריך</th>
            <th>יום</th>
            <th>ארוחה</th>
            <th>מזון</th>
            <th>יח׳ בסיס</th>
            <th>כמות</th>
            <th>קל׳</th>
            <th>חלב׳</th>
            <th>פח׳</th>
            <th>שומ׳</th>
            <th>איפוס</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>
</div>

<script>
let FOODS = [];
const FOODS_FALLBACK = [
  {"name": "אנטריקוט",           "unit": "100 גרם",        "cal": 250, "protein": 26,  "carbs": 0,  "fat": 17},
  {"name": "בקבוק בירה",          "unit": "330 מ״ל",         "cal": 150, "protein": 1.5, "carbs": 13, "fat": 0},
  {"name": "גבינה צהובה",         "unit": "100 גרם",        "cal": 350, "protein": 25,  "carbs": 1,  "fat": 28},
  {"name": "זיתים",               "unit": "10 יחידות",      "cal": 45,  "protein": 0.3, "carbs": 1.2,"fat": 4.2},
  {"name": "חביתה 2 ביצים",       "unit": "מנה",             "cal": 180, "protein": 14,  "carbs": 1,  "fat": 14},
  {"name": "חזה עוף",             "unit": "100 גרם",        "cal": 165, "protein": 31,  "carbs": 0,  "fat": 3.6},
  {"name": "חמאת בוטנים",         "unit": "כף",             "cal": 95,  "protein": 4,   "carbs": 3,  "fat": 8},
  {"name": "טחינה",               "unit": "כף",             "cal": 90,  "protein": 2.5, "carbs": 3,  "fat": 8},
  {"name": "יוגורט דנונה 0% תות", "unit": "גביע",           "cal": 100, "protein": 10,  "carbs": 12, "fat": 0},
  {"name": "ירקות",               "unit": "100 גרם",        "cal": 25,  "protein": 1,   "carbs": 5,  "fat": 0.2},
  {"name": "מנת וויסקי",          "unit": "צ׳ייסר 44 מ״ל", "cal": 105, "protein": 0,   "carbs": 0,  "fat": 0},
  {"name": "מנת שווארמה הודו",    "unit": "מנה",             "cal": 550, "protein": 38,  "carbs": 35, "fat": 28},
  {"name": "סלמון",               "unit": "100 גרם",        "cal": 208, "protein": 22,  "carbs": 0,  "fat": 13},
  {"name": "סלמי מעושן",          "unit": "100 גרם",        "cal": 407, "protein": 22,  "carbs": 2,  "fat": 35},
  {"name": "פיתה כוסמין מיני",    "unit": "יחידה",           "cal": 120, "protein": 4,   "carbs": 22, "fat": 1.5},
  {"name": "פסטרמה פרגית",        "unit": "100 גרם",        "cal": 140, "protein": 21,  "carbs": 2,  "fat": 5},
  {"name": "שיבולת שועל",         "unit": "40 גרם",         "cal": 150, "protein": 5,   "carbs": 27, "fat": 3},
  {"name": "תפוח אדמה קטן",       "unit": "יחידה",           "cal": 90,  "protein": 2,   "carbs": 20, "fat": 0.1}
];
const MEALS = ["א\"ב", "א\"צ", "א\"ע"];

const WEEK_KEY = "meal-tracker-week-start";
const HEBREW_DAY_NAMES = ["א׳", "ב׳", "ג׳", "ד׳", "ה׳", "ו׳", "שבת"];

function computeWeekDays(sundayDate) {
  const days = [];
  for (let i = 0; i < 7; i++) {
    const d = new Date(sundayDate);
    d.setDate(d.getDate() + i);
    const dd = String(d.getDate()).padStart(2, "0");
    const mm = String(d.getMonth() + 1).padStart(2, "0");
    days.push([`${dd}.${mm}`, HEBREW_DAY_NAMES[i]]);
  }
  return days;
}

function getInitialWeekSunday() {
  const saved = localStorage.getItem(WEEK_KEY);
  if (saved) {
    const d = new Date(saved + "T00:00:00");
    if (!isNaN(d.getTime())) return d;
  }
  const now = new Date();
  now.setDate(now.getDate() - now.getDay());
  now.setHours(0, 0, 0, 0);
  return now;
}

function formatDateISO(d) {
  const yyyy = d.getFullYear();
  const mm = String(d.getMonth() + 1).padStart(2, "0");
  const dd = String(d.getDate()).padStart(2, "0");
  return `${yyyy}-${mm}-${dd}`;
}

let currentWeekSunday = getInitialWeekSunday();
let DAYS = computeWeekDays(currentWeekSunday);
const STORAGE_KEY = "meal-tracker-v3";
const CUSTOM_FOODS_KEY = "meal-tracker-custom-foods";

function loadCustomFoods() {
  try {
    const raw = localStorage.getItem(CUSTOM_FOODS_KEY);
    if (!raw) return [];
    const parsed = JSON.parse(raw);
    return Array.isArray(parsed) ? parsed : [];
  } catch(e) { return []; }
}

let customFoods = loadCustomFoods();

function saveCustomFoods() {
  localStorage.setItem(CUSTOM_FOODS_KEY, JSON.stringify(customFoods));
}

function getAllFoods() {
  return [...FOODS, ...customFoods].sort((a, b) => a.name.localeCompare(b.name, "he"));
}

const tbody = document.getElementById("tbody");
const statusEl = document.getElementById("status");
const chartGrid = document.getElementById("chartGrid");

function buildDefaultRows() {
  return [];
}

function migrateRow(row) {
  const r = { ...row };
  if (r.dayIndex == null || r.dayIndex < 0) {
    r.dayIndex = DAYS.findIndex(d => d[0] === r.date);
  }
  if (r.mealIndex == null || r.mealIndex < 0) {
    r.mealIndex = MEALS.indexOf(r.meal);
  }
  if (r.dayIndex >= 0 && r.dayIndex < DAYS.length) {
    r.date = DAYS[r.dayIndex][0];
    r.day = DAYS[r.dayIndex][1];
  }
  return r;
}

function importRows(arr) {
  return arr
    .map(row => migrateRow(row))
    .filter(r => r.food && r.dayIndex >= 0 && r.mealIndex >= 0);
}

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return [];
    const parsed = JSON.parse(raw);
    if (!Array.isArray(parsed) || !parsed.length) return [];
    return importRows(parsed);
  } catch(e) {
    return [];
  }
}

let state = loadState();

function saveState(message = "נשמר אוטומטית") {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  statusEl.textContent = message;
  setTimeout(() => {
    if (statusEl.textContent === message) statusEl.textContent = "";
  }, 1800);
}

function getFoodByName(name) {
  return getAllFoods().find(f => f.name === name);
}

function round1(v) {
  if (v === "" || v == null || Number.isNaN(v)) return "";
  return Math.round(v * 10) / 10;
}

function clearRow(row) {
  row.food = "";
  row.unit = "";
  row.qty = "";
  row.cal = "";
  row.protein = "";
  row.carbs = "";
  row.fat = "";
  row.manual = false;
}

function applyFood(row) {
  if (row.manual) return;
  const food = getFoodByName(row.food);
  const qty = parseFloat(row.qty);
  if (!food) {
    row.unit = "";
    row.cal = "";
    row.protein = "";
    row.carbs = "";
    row.fat = "";
    return;
  }
  row.unit = food.unit;
  if (!qty || qty <= 0) {
    row.cal = "";
    row.protein = "";
    row.carbs = "";
    row.fat = "";
    return;
  }
  row.cal = round1(food.cal * qty);
  row.protein = round1(food.protein * qty);
  row.carbs = round1(food.carbs * qty);
  row.fat = round1(food.fat * qty);
}

function dayTotals(dayIndex) {
  const rows = state.filter(r => r.dayIndex === dayIndex);
  const sum = key => round1(rows.reduce((acc, r) => acc + (parseFloat(r[key]) || 0), 0)) || 0;
  return { cal: sum("cal"), protein: sum("protein"), carbs: sum("carbs"), fat: sum("fat") };
}

function renderChart() {
  chartGrid.innerHTML = "";
  const totals = DAYS.map((d, i) => ({ label: d[1], cal: dayTotals(i).cal || 0 }));
  const max = Math.max(...totals.map(t => t.cal), 100);
  totals.forEach(t => {
    const h = Math.max(2, (t.cal / max) * 110);
    const el = document.createElement("div");
    el.className = "bar-group";
    el.innerHTML = `<div class="bar-value">${t.cal}</div><div class="bar" style="height:${h}px"></div><div class="bar-label">${t.label}</div>`;
    chartGrid.appendChild(el);
  });
}

function render() {
  tbody.innerHTML = "";
  DAYS.forEach((day, dayIndex) => {
    let dayFirstRow = true;
    let dayHasRows = false;
    MEALS.forEach((meal, mealIndex) => {
      const mealEntries = state
        .map((r, i) => [r, i])
        .filter(([r]) => r.dayIndex === dayIndex && r.mealIndex === mealIndex);
      mealEntries.forEach(([row, idx], localIndex) => {
        dayHasRows = true;
        const isFirstOfMeal = localIndex === 0;
        const isFirstOfDay = dayFirstRow;
        if (isFirstOfDay) dayFirstRow = false;
        const rowEl = document.createElement("tr");
        rowEl.innerHTML = `
          <td class="daycell datecell">${isFirstOfDay ? row.date : ""}</td>
          <td class="daycell daynamecell">${isFirstOfDay ? row.day : ""}</td>
          <td class="mealcell">${isFirstOfMeal ? row.meal : ""}</td>
          <td class="foodcell">
            <div class="ac-wrap">
              <input class="ac-input food-input" data-idx="${idx}" type="text" autocomplete="off" placeholder="בחר או הקלד מזון" value="${row.food || ""}">
              <button class="ac-clear row-clear-x" data-idx="${idx}" type="button" aria-label="נקה">×</button>
            </div>
          </td>
          <td class="unitcell">${row.unit || ""}</td>
          <td class="qtycell"><input class="qty" type="number" min="0" step="0.25" data-idx="${idx}" value="${row.qty}"></td>
          <td class="calcell"><input class="metric" type="text" aria-label="קלוריות" value="${row.cal}" readonly></td>
          <td class="proteincell"><input class="metric" type="text" aria-label="חלבון" value="${row.protein}" readonly></td>
          <td class="carbscell"><input class="metric" type="text" aria-label="פחמימות" value="${row.carbs}" readonly></td>
          <td class="fatcell"><input class="metric" type="text" aria-label="שומן" value="${row.fat}" readonly></td>
          <td class="actioncell"><button class="small delete-row" data-idx="${idx}" type="button">מחק</button></td>
        `;
        tbody.appendChild(rowEl);
      });
    });
    if (dayHasRows) {
      const totals = dayTotals(dayIndex);
      const summary = document.createElement("tr");
      summary.className = "summary";
      summary.innerHTML = `
        <td class="datecell">${day[0]}</td><td class="daynamecell">${day[1]}</td><td class="total-label">סה״כ</td><td class="foodcell"></td><td class="unitcell"></td><td class="qtycell"></td>
        <td class="calcell">${totals.cal}</td><td class="proteincell">${totals.protein}</td><td class="carbscell">${totals.carbs}</td><td class="fatcell">${totals.fat}</td><td class="actioncell"></td>
      `;
      tbody.appendChild(summary);
    }
  });
  initAutocompleteInputs();
  bindEvents();
  renderChart();
}

function bindEvents() {
  document.querySelectorAll(".qty").forEach(el => {
    el.addEventListener("input", e => {
      const idx = parseInt(e.target.dataset.idx, 10);
      state[idx].qty = e.target.value;
      applyFood(state[idx]);
      saveState();
      render();
    });
  });

  document.querySelectorAll(".delete-row, .row-clear-x").forEach(btn => {
    btn.addEventListener("click", e => {
      const idx = parseInt(e.target.dataset.idx, 10);
      state.splice(idx, 1);
      saveState("השורה נמחקה");
      render();
    });
  });
}

function attachAutocomplete(inputEl, menuEl, onSelect) {
  let activeIndex = -1;
  let currentItems = [];

  function matches(q) {
    const query = (q || "").trim().toLowerCase();
    const all = getAllFoods();
    if (!query) return all.slice(0, 8);
    return all.filter(f => f.name.toLowerCase().includes(query)).slice(0, 12);
  }

  function closeMenu() {
    menuEl.style.display = "none";
    menuEl.innerHTML = "";
    activeIndex = -1;
    currentItems = [];
  }

  function positionMenu() {
    const rect = inputEl.getBoundingClientRect();
    menuEl.style.width = rect.width + "px";
    menuEl.style.left = rect.left + "px";
    menuEl.style.top = (rect.bottom + 4) + "px";
  }

  function renderMenu(items) {
    currentItems = items;
    if (!items.length) {
      menuEl.innerHTML = `<div class="ac-item">לא נמצאו תוצאות</div>`;
      positionMenu();
      menuEl.style.display = "block";
      return;
    }
    menuEl.innerHTML = items.map((item, idx) => `
      <div class="ac-item ${idx===activeIndex ? 'active' : ''}" data-name="${item.name}">
        <div>${item.name}</div>
        <div class="helper">${item.unit} <span class="chip">${item.cal} קל׳</span></div>
      </div>
    `).join("");
    positionMenu();
    menuEl.style.display = "block";

    menuEl.querySelectorAll(".ac-item[data-name]").forEach(itemEl => {
      itemEl.addEventListener("mousedown", ev => {
        ev.preventDefault();
        const name = itemEl.dataset.name;
        onSelect(name);
        closeMenu();
      });
    });
  }

  inputEl.addEventListener("focus", () => renderMenu(matches(inputEl.value)));
  inputEl.addEventListener("input", () => {
    activeIndex = -1;
    renderMenu(matches(inputEl.value));
  });

  inputEl.addEventListener("keydown", e => {
    if (!currentItems.length && !menuEl.innerHTML) return;
    if (e.key === "ArrowDown") {
      e.preventDefault();
      activeIndex = Math.min(activeIndex + 1, currentItems.length - 1);
      renderMenu(currentItems);
    } else if (e.key === "ArrowUp") {
      e.preventDefault();
      activeIndex = Math.max(activeIndex - 1, 0);
      renderMenu(currentItems);
    } else if (e.key === "Enter") {
      if (activeIndex >= 0 && currentItems[activeIndex]) {
        e.preventDefault();
        onSelect(currentItems[activeIndex].name);
        closeMenu();
      }
    } else if (e.key === "Escape") {
      closeMenu();
    }
  });

  window.addEventListener("resize", () => {
    if (menuEl.style.display === "block") positionMenu();
  });
  document.addEventListener("scroll", () => {
    if (menuEl.style.display === "block") positionMenu();
  }, true);
  document.addEventListener("click", e => {
    if (e.target !== inputEl && !menuEl.contains(e.target)) closeMenu();
  });
}

function initAutocompleteInputs() {
  document.querySelectorAll(".food-input").forEach(inputEl => {
    const idx = parseInt(inputEl.dataset.idx, 10);
    const menuEl = document.createElement("div");
    menuEl.className = "ac-menu";
    document.body.appendChild(menuEl);

    attachAutocomplete(inputEl, menuEl, name => {
      state[idx].food = name;
      state[idx].manual = false;
      if (!state[idx].qty) state[idx].qty = 1;
      applyFood(state[idx]);
      saveState();
      render();
    });

    inputEl.addEventListener("blur", () => {
      const v = inputEl.value.trim();
      if (!v) return;
      const exact = getFoodByName(v);
      if (exact) {
        state[idx].food = exact.name;
        state[idx].manual = false;
        if (!state[idx].qty) state[idx].qty = 1;
        applyFood(state[idx]);
        saveState();
        render();
      }
    });
  });
}

function initQuickAdd() {
  const mealSel = document.getElementById("quickMeal");
  mealSel.innerHTML = MEALS.map((m, i) => `<option value="${i}">${m}</option>`).join("");

  const quickInput = document.getElementById("quickFoodInput");
  const quickMenu = document.getElementById("quickFoodMenu");

  attachAutocomplete(quickInput, quickMenu, name => {
    quickInput.value = name;
  });
}

function quickAdd() {
  const dayIndex = parseInt(document.getElementById("quickDay").value, 10);
  const mealIndex = parseInt(document.getElementById("quickMeal").value, 10);
  const foodText = document.getElementById("quickFoodInput").value.trim();
  const qty = parseFloat(document.getElementById("quickQty").value) || 1;
  const food = getFoodByName(foodText);
  if (!food) {
    statusEl.textContent = "בחר מזון מהרשימה";
    return;
  }
  const newRow = {
    dayIndex, mealIndex,
    date: DAYS[dayIndex][0], day: DAYS[dayIndex][1], meal: MEALS[mealIndex],
    food: food.name, unit: food.unit, qty, cal: "", protein: "", carbs: "", fat: "", manual: false
  };
  applyFood(newRow);
  state.push(newRow);
  saveState("הפריט נוסף");
  render();
}

document.getElementById("quickAddBtn").addEventListener("click", quickAdd);

function quickAddManual() {
  const dayIndex = parseInt(document.getElementById("quickDay").value, 10);
  const mealIndex = parseInt(document.getElementById("quickMeal").value, 10);
  const name = document.getElementById("manualName").value.trim();
  const unit = document.getElementById("manualUnit").value.trim() || "מנה";
  const cal = parseFloat(document.getElementById("manualCal").value) || 0;
  const protein = parseFloat(document.getElementById("manualProtein").value) || 0;
  const carbs = parseFloat(document.getElementById("manualCarbs").value) || 0;
  const fat = parseFloat(document.getElementById("manualFat").value) || 0;

  if (!name) {
    statusEl.textContent = "נא להזין שם מזון";
    setTimeout(() => statusEl.textContent = "", 1800);
    return;
  }

  const newRow = {
    dayIndex, mealIndex,
    date: DAYS[dayIndex][0], day: DAYS[dayIndex][1], meal: MEALS[mealIndex],
    food: name, unit, qty: "",
    cal: round1(cal), protein: round1(protein), carbs: round1(carbs), fat: round1(fat),
    manual: true
  };
  state.push(newRow);
  saveState("הפריט נוסף");
  render();

  document.getElementById("manualName").value = "";
  document.getElementById("manualUnit").value = "";
  document.getElementById("manualCal").value = "";
  document.getElementById("manualProtein").value = "";
  document.getElementById("manualCarbs").value = "";
  document.getElementById("manualFat").value = "";
}

document.getElementById("manualAddBtn").addEventListener("click", quickAddManual);

document.getElementById("manualSectionToggle").addEventListener("click", () => {
  const section = document.getElementById("manualSection");
  section.classList.toggle("open");
});

document.getElementById("importBtn").addEventListener("click", () => {
  document.getElementById("importFile").click();
});

document.getElementById("importFile").addEventListener("change", async (e) => {
  const file = e.target.files && e.target.files[0];
  if (!file) return;
  try {
    const text = await file.text();
    const imported = JSON.parse(text);
    if (!Array.isArray(imported)) {
      throw new Error("מבנה JSON לא תקין");
    }
    state = importRows(imported);
    state.forEach(applyFood);
    saveState("הנתונים יובאו בהצלחה");
    render();
  } catch (err) {
    statusEl.textContent = "ייבוא נכשל. בדוק שזה קובץ JSON שיוצא מהמערכת.";
    setTimeout(() => statusEl.textContent = "", 2500);
  } finally {
    e.target.value = "";
  }
});

document.getElementById("resetBtn").addEventListener("click", () => {
  if (!confirm("לאפס את כל הנתונים?")) return;
  state = [];
  saveState("כל הנתונים אופסו");
  render();
});
document.getElementById("exportBtn").addEventListener("click", () => {
  const blob = new Blob([JSON.stringify(state, null, 2)], {type:"application/json;charset=utf-8"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = "meal-tracker-data.json"; a.click();
  URL.revokeObjectURL(url);
  statusEl.textContent = "קובץ JSON יוצא";
  setTimeout(() => statusEl.textContent = "", 1500);
});

document.getElementById("clearStorageBtn").addEventListener("click", () => {
  if (!confirm("למחוק את כל הנתונים המקומיים השמורים?\n(נתוני ארוחות, מזונות מותאמים, הגדרות שבוע)")) return;
  localStorage.removeItem(STORAGE_KEY);
  localStorage.removeItem(CUSTOM_FOODS_KEY);
  localStorage.removeItem(WEEK_KEY);
  location.reload();
});

(async () => {
  try {
    const res = await fetch("./foods.json");
    const data = await res.json();
    FOODS = (Array.isArray(data) && data.length > 0) ? data : FOODS_FALLBACK;
  } catch(e) {
    console.error("Failed to load foods.json, using fallback:", e);
    FOODS = FOODS_FALLBACK;
  }
  state.forEach(applyFood);
  initQuickAdd();
  initWeekPicker();
  initCustomFoodSection();
  render();
})();

function updateDaySelect() {
  const daySel = document.getElementById("quickDay");
  if (!daySel) return;
  const prev = parseInt(daySel.value, 10);
  daySel.innerHTML = DAYS.map((d, i) => `<option value="${i}">${d[0]} · ${d[1]}</option>`).join("");
  daySel.value = (!isNaN(prev) && prev < DAYS.length) ? String(prev) : "0";
}

function updateWeekLabel() {
  const lbl = document.getElementById("weekLabel");
  if (!lbl) return;
  lbl.textContent = `${DAYS[0][0]} – ${DAYS[6][0]}`;
}

function initWeekPicker() {
  updateDaySelect();
  updateWeekLabel();
  const input = document.getElementById("weekDateInput");
  if (!input) return;
  input.value = formatDateISO(currentWeekSunday);

  input.addEventListener("change", () => {
    if (!input.value) return;
    const picked = new Date(input.value + "T00:00:00");
    if (isNaN(picked.getTime())) return;
    const sunday = new Date(picked);
    sunday.setDate(sunday.getDate() - sunday.getDay());
    input.value = formatDateISO(sunday);
    currentWeekSunday = sunday;
    DAYS = computeWeekDays(sunday);
    localStorage.setItem(WEEK_KEY, formatDateISO(sunday));
    state.forEach(row => {
      if (row.dayIndex >= 0 && row.dayIndex < DAYS.length) {
        row.date = DAYS[row.dayIndex][0];
        row.day = DAYS[row.dayIndex][1];
      }
    });
    updateDaySelect();
    updateWeekLabel();
    saveState("השבוע עודכן");
    render();
  });
}

function initCustomFoodSection() {
  const section = document.getElementById("customFoodSection");
  const toggle = document.getElementById("customFoodToggle");
  const saveBtn = document.getElementById("cfSaveBtn");
  const listEl = document.getElementById("customFoodList");

  toggle.addEventListener("click", () => {
    section.classList.toggle("open");
  });

  listEl.addEventListener("click", e => {
    const btn = e.target.closest(".cf-del");
    if (!btn) return;
    const i = parseInt(btn.dataset.cfIndex, 10);
    customFoods.splice(i, 1);
    saveCustomFoods();
    renderCustomFoodList();
  });

  saveBtn.addEventListener("click", () => {
    const name = document.getElementById("cfName").value.trim();
    const unit = document.getElementById("cfUnit").value.trim() || "מנה";
    const cal = parseFloat(document.getElementById("cfCal").value) || 0;
    const protein = parseFloat(document.getElementById("cfProtein").value) || 0;
    const carbs = parseFloat(document.getElementById("cfCarbs").value) || 0;
    const fat = parseFloat(document.getElementById("cfFat").value) || 0;

    if (!name) {
      statusEl.textContent = "נא להזין שם מזון";
      setTimeout(() => statusEl.textContent = "", 1800);
      return;
    }
    if (getAllFoods().some(f => f.name === name)) {
      statusEl.textContent = "מזון בשם זה כבר קיים ברשימה";
      setTimeout(() => statusEl.textContent = "", 1800);
      return;
    }

    customFoods.push({ name, unit, cal, protein, carbs, fat, custom: true });
    saveCustomFoods();

    document.getElementById("cfName").value = "";
    document.getElementById("cfUnit").value = "";
    document.getElementById("cfCal").value = "";
    document.getElementById("cfProtein").value = "";
    document.getElementById("cfCarbs").value = "";
    document.getElementById("cfFat").value = "";

    renderCustomFoodList();
    statusEl.textContent = `המזון "${name}" נוסף בהצלחה`;
    setTimeout(() => statusEl.textContent = "", 2000);
  });

  renderCustomFoodList();
}

function renderCustomFoodList() {
  const listEl = document.getElementById("customFoodList");
  if (!listEl) return;
  if (!customFoods.length) {
    listEl.innerHTML = "";
    return;
  }
  listEl.innerHTML = `<div style="font-size:13px;font-weight:700;margin-bottom:6px;color:var(--muted)">מזונות מותאמים שמורים:</div>` +
    customFoods.map((f, i) => `
      <div class="custom-food-list-item">
        <div>
          <div class="cf-name">${escapeHtml(f.name)}</div>
          <div class="cf-meta">${escapeHtml(f.unit)} · ${escapeHtml(String(f.cal))} קל׳ · חלב׳ ${escapeHtml(String(f.protein))}ג׳ · פח׳ ${escapeHtml(String(f.carbs))}ג׳ · שומ׳ ${escapeHtml(String(f.fat))}ג׳</div>
        </div>
        <button class="small cf-del" data-cf-index="${i}" type="button">מחק</button>
      </div>
    `).join("");
}

function escapeHtml(str) {
  return String(str).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
}
</script>

if ('serviceWorker' in navigator) {

      console.log('SW registration failed', err);
    });
  });
}
